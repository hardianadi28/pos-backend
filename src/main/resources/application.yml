spring:
  application:
    name: pos-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/posdb
    username: posuser
    password: pospassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

app:
  jwt:
    secret: ${JWT_SECRET:4b633534346231333464333535313437346233373539353934653530346234313531333134393633343633383335343834313333333934393431353234643530}
    issuer: pos-backend
